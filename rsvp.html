<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MeetApp Event</title>

<meta property="og:title" content="You're invited!">
<meta property="og:description" content="Tap to RSVP">
<meta property="og:type" content="website">

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
text-align:center;
}

h2{
margin-top:0;
}

.info{
color:#666;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:16px;
}

.buttons{
margin-top:20px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.going{background:#4CAF50;color:white;}
.maybe{background:#FFC107;color:white;}
.no{background:#F44336;color:white;}

.status{
margin-top:15px;
color:#444;
}

.install{
margin-top:25px;
font-size:14px;
color:#888;
}

.install a{
color:#007BFF;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 id="title">Loading event...</h2>

<div class="info">
<p id="time"></p>
<p id="location"></p>
</div>

<p id="attendees"></p>

<input id="name" placeholder="Your name">

<input id="phone" placeholder="Your phone number" type="tel">

<div class="buttons">

<button class="going" onclick="rsvp('Accepted')">Going</button>
<button class="maybe" onclick="rsvp('Maybe')">Maybe</button>
<button class="no" onclick="rsvp('Declined')">Not Going</button>

</div>

<p class="status" id="status"></p>

<div class="install">
Organize events easily with
<b>MeetApp</b><br>
<a href="#">Get the app</a>
</div>

</div>

</div>

<script>

const API_BASE_URL = "https://bk5d7i9au0.execute-api.ap-south-1.amazonaws.com/Prod";

// Extract encoded event ID from URL path
const encodedEventId = window.location.pathname.split("/").pop();

function getEncodedEventId() {
  const hashValue = window.location.hash.replace("#", "").trim();
  if (hashValue) {
    return hashValue;
  }

  const pathSegments = window.location.pathname.split("/").filter(Boolean);
  const lastSegment = pathSegments[pathSegments.length - 1] || "";
  if (!lastSegment || lastSegment.endsWith(".html")) {
    return "";
  }

  return lastSegment;
}

const encodedEventId = getEncodedEventId();

console.log("[RSVP] Encoded Event ID:", encodedEventId);
  
// Fetch event details from Lambda
async function loadEventDetails() {
  if (!encodedEventId) {
    document.getElementById("title").innerText = "Invalid event link";
    return;
  }
  
  try {
    console.log("[RSVP] GET URL:", `${API_BASE_URL}/meetapp/events/rsvp/${encodedEventId}`);
    const response = await fetch(`${API_BASE_URL}/meetapp/event/rsvp/${encodedEventId}`);
    const data = await response.json();

    if (data.success && data.data) {
      const event = data.data;

      // Set event title
      document.getElementById("title").innerText = event.title || "Event";

      // Format and display time
      const startTime = new Date(event.evStartTime);
      const endTime = new Date(event.evEndTime);
      const dateStr = startTime.toLocaleDateString('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
      const startTimeStr = startTime.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit'
      });
      const endTimeStr = endTime.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit'
      });

      document.getElementById("time").innerText = `${dateStr}, ${startTimeStr} - ${endTimeStr}`;

      // Display location if available
      if (event.location) {
        document.getElementById("location").innerText = event.location;
      }

      // Display RSVP counts
      const counts = event.rsvpStatus;
      document.getElementById("attendees").innerText =
        `${counts.accepted} going • ${counts.maybe} maybe • ${counts.notResponded} awaiting response`;
    } else {
      document.getElementById("title").innerText = "Event not found";
    }
  } catch (error) {
    console.error("Error loading event details:", error);
    document.getElementById("title").innerText = "Error loading event";
  }
}

// Submit RSVP
async function rsvp(status) {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone")?.value?.trim() || "";

  if (!name) {
    alert("Please enter your name");
    return;
  }

  if (!phone) {
    alert("Please enter your phone number");
    return;
  }

  try {
    const response = await fetch(`${API_BASE_URL}/meetapp/event/rsvp`, {
      method: "POST",
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        encoded_event_id: encodedEventId,
        name: name,
        phone: phone,
        status: status
      })
    });

    const data = await response.json();

    if (data.success) {
      document.getElementById("status").innerText = "RSVP saved � ";
      // Clear form
      document.getElementById("name").value = "";
      if (document.getElementById("phone")) {
        document.getElementById("phone").value = "";
      }
    } else {
      alert("Error: " + (data.message || "Failed to save RSVP"));
    }
  } catch (error) {
    console.error("Error submitting RSVP:", error);
    alert("Error submitting RSVP. Please try again.");
  }
}

// Load event details when page loads
loadEventDetails();

</script>

</body>
</html>
